<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블록 찾기 온라인</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f0f0; }
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #main-game { display: none; flex: 1; padding: 20px; gap: 20px; }
        
        .left-panel { flex: 2; display: flex; flex-direction: column; gap: 10px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        /* 이름 및 V 표시 스타일 */
        .name-label { font-size: 1.2em; font-weight: bold; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .v-mark { color: #4CAF50; font-size: 1.5em; display: none; }

        .grid { 
            width: 100%; height: 200px; background: white; border: 2px solid #333; 
            display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(10, 1fr); 
        }
        .grid div { border: 1px solid #ddd; cursor: pointer; }
        
        .my-block { background: #4CAF50 !important; }
        .hit { background: #ff5252 !important; }
        .miss { background: #9e9e9e !important; }
        
        .log-area, .chat-area { flex: 1; background: white; border: 1px solid #ccc; overflow-y: auto; padding: 10px; font-size: 0.9em; }
        .chat-input-group { display: flex; }
        .user-list { background: #eee; padding: 10px; border-radius: 5px; }
        
        button { cursor: pointer; padding: 8px; border-radius: 4px; border: 1px solid #999; }
        #start-btn { background: #4CAF50; color: white; border: none; font-size: 1.1em; transition: 0.3s; padding: 10px 20px; }
        #start-btn:disabled { background: #ccc; cursor: not-allowed; }
        .my-turn-border { border: 4px solid #ff9800 !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>블록 찾기</h1>
        <div style="margin-bottom: 10px;">
            <input type="text" id="name-input" placeholder="이름 입력">
            <input type="number" id="room-input" placeholder="방 번호 (1~99)" min="1" max="99">
        </div>
        <button onclick="joinGame()">입장하기</button>
    </div>

    <div id="main-game">
        <div class="left-panel">
            <div class="name-label">
                상대: <span id="opp-name">대기 중</span> <span id="opp-v" class="v-mark">V</span>
            </div>
            <div id="opponent-grid" class="grid"></div>
            
            <div style="text-align: center; margin: 10px 0;">
                <button id="start-btn" onclick="handleButtonClick()">준비하기</button>
            </div>
            
            <div class="name-label">
                나: <span id="my-name-display">-</span> (블록 <span id="block-count">0</span>/10) <span id="my-v" class="v-mark">V</span>
            </div>
            <div id="my-grid" class="grid"></div>
        </div>

        <div class="right-panel">
            <h4>게임 로그</h4><div id="game-log" class="log-area"></div>
            <h4>실시간 채팅</h4><div id="chat-log" class="chat-area"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" style="flex:1" onkeypress="if(event.keyCode==13) sendChat()">
                <button onclick="sendChat()">전송</button>
            </div>
            <div class="user-list">
                <strong>접속자 목록</strong>
                <div id="player-list">플레이어: </div>
                <div id="spectator-list">관전자: </div>
                <div class="btn-group">
                    <button onclick="changeRole('player')">플레이어로 가기</button>
                    <button onclick="changeRole('spectator')">관전자로 가기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myRoom = "", myBlocks = []; 
        let isMyTurn = false;
        let gameStatus = "LOBBY"; 

        function joinGame() {
            myName = document.getElementById('name-input').value;
            myRoom = document.getElementById('room-input').value;
            if(!myName || !myRoom) return alert("입력 정보 부족!");
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            socket.emit('joinRoom', { roomCode: myRoom, name: myName });
            initGrids();
        }

        function initGrids() {
            const oppGrid = document.getElementById('opponent-grid');
            const myGrid = document.getElementById('my-grid');
            oppGrid.innerHTML = ''; myGrid.innerHTML = '';

            for(let i=0; i<200; i++) {
                const oppCell = document.createElement('div');
                oppCell.onclick = function() {
                    if (gameStatus !== 'PLAYING' || !isMyTurn) return;
                    socket.emit('attack', i);
                };
                oppGrid.appendChild(oppCell);

                const myCell = document.createElement('div');
                myCell.onclick = function() {
                    if (gameStatus !== 'PLACING') return; 
                    if (myBlocks.includes(i)) {
                        myBlocks = myBlocks.filter(b => b !== i);
                    } else if (myBlocks.length < 10) {
                        myBlocks.push(i);
                    } else {
                        return alert("블록은 최대 10개까지 설치 가능합니다!");
                    }
                    renderMyBlocks(); // 내 블록 화면 갱신
                };
                myGrid.appendChild(myCell);
            }
        }

        // [추가] 내 블록들만 다시 그려주는 함수
        function renderMyBlocks() {
            const myGrid = document.getElementById('my-grid');
            document.getElementById('block-count').innerText = myBlocks.length;
            for(let i=0; i<200; i++) {
                myGrid.children[i].classList.remove('my-block');
                if (myBlocks.includes(i)) myGrid.children[i].classList.add('my-block');
            }
        }

        function handleButtonClick() {
            const btn = document.getElementById('start-btn');
            if (btn.innerText === "준비하기" || btn.innerText === "준비 취소") {
                socket.emit('toggleReady');
            } else if (btn.innerText === "게임 시작하기!") {
                socket.emit('startGame');
            } else if (btn.innerText === "배치 완료") {
                if (myBlocks.length < 10) return alert("블록 10개를 모두 설치해주세요!");
                btn.disabled = true;
                btn.innerText = "상대방 대기 중...";
                socket.emit('finishPlacing', myBlocks);
            } else if (btn.innerText === "다시하기 (로비로)") {
                socket.emit('requestRematch');
            }
        }

        socket.on('roomData', data => {
            const me = data.players.find(p => p.id === socket.id);
            const opp = data.players.find(p => p.id !== socket.id);
            const btn = document.getElementById('start-btn');

            document.getElementById('my-v').style.display = (me && me.isReady) ? 'inline' : 'none';
            if (opp) {
                document.getElementById('opp-name').innerText = opp.name;
                document.getElementById('opp-v').style.display = opp.isReady ? 'inline' : 'none';
            } else {
                document.getElementById('opp-name').innerText = "대기 중";
                document.getElementById('opp-v').style.display = 'none';
            }

            if (data.gameState === 'LOBBY') {
                gameStatus = "LOBBY";
                btn.disabled = false;
                if (data.players.length === 2 && data.players.every(p => p.isReady)) {
                    btn.innerText = "게임 시작하기!";
                    btn.style.background = "#FF9800";
                } else {
                    btn.innerText = (me && me.isReady) ? "준비 취소" : "준비하기";
                    btn.style.background = "#2196F3";
                }
            }
            document.getElementById('player-list').innerText = "플레이어: " + data.players.map(p => p.name).join(', ');
            document.getElementById('spectator-list').innerText = "관전자: " + data.spectators.map(s => s.name).join(', ');
        });

        socket.on('startPlacing', () => {
            gameStatus = "PLACING";
            const btn = document.getElementById('start-btn');
            btn.innerText = "배치 완료";
            btn.style.background = "#4CAF50";
            btn.disabled = false;
        });

        socket.on('gameStart', data => {
            gameStatus = "PLAYING";
            updateTurn(data.turn);
        });

        // [중요] 5프레이즈 이동 시 내 화면에 블록 위치 동기화
        socket.on('updateMyBlocks', newBlocks => {
            myBlocks = newBlocks;
            renderMyBlocks();
        });

        socket.on('attackResult', data => {
            const isAttacker = (data.attacker === socket.id);
            const targetGrid = isAttacker ? document.getElementById('opponent-grid') : document.getElementById('my-grid');
            const cell = targetGrid.children[data.index];
            if (data.hit) { cell.classList.add('hit'); }
            else { cell.classList.add('miss'); updateTurn(data.nextTurn); }
            addGameLog(`${isAttacker ? "나의" : "상대의"} 공격: ${data.index}번 ${data.hit ? "적중!" : "불발"}`);
        });

        function updateTurn(currentTurnId) {
            isMyTurn = (socket.id === currentTurnId);
            const btn = document.getElementById('start-btn');
            btn.innerText = isMyTurn ? "🔥 나의 턴" : "⏳ 상대 턴";
            btn.style.background = isMyTurn ? "#ff5252" : "#333";
            document.getElementById('opponent-grid').className = isMyTurn ? "grid my-turn-border" : "grid";
        }

        socket.on('gameOver', data => {
            gameStatus = "ENDED";
            alert(`게임 종료!! 승자: ${data.winner}`);
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.innerText = "다시하기 (로비로)";
            btn.style.background = "#9c27b0";
        });

        // [신규] 리매치 시작 시 화면 초기화
        socket.on('rematchStarted', () => {
            myBlocks = [];
            document.getElementById('block-count').innerText = "0";
            initGrids();
            addGameLog("[알림] 게임이 초기화되었습니다.");
        });

        function changeRole(role) { socket.emit('changeRole', role); }
        function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            socket.emit('sendChat', input.value);
            input.value = "";
        }
        function addGameLog(msg) {
            const log = document.getElementById('game-log');
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        socket.on('receiveChat', data => {
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div><strong>${data.name}:</strong> ${data.msg}</div>`;
            log.scrollTop = log.scrollHeight;
        });
        socket.on('systemMsg', msg => { addGameLog(`[시스템] ${msg}`); });
    </script>
</body>
</html>
